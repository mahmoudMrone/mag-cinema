<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" 
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFKKxLhei6S9CQXF EbbKuqLg0DA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"
    />
    <title>Login & Signup Form</title>
    <style>
        *{
            margin: 0; 
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        body {
            background-color: #02050A; /* Darker background color */
            background: linear-gradient(to right, #02050A, #0A1E36); /* Adjusted gradient */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column; 
            height: 100vh;
        }
        .container {
            background-color: #1A618A;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.35);
            position: relative;
            overflow: hidden; 
            width: 768px;
            max-width: 100%;
            min-height: 480px;
        }
        .container p {
            font-size: 14px;
            line-height: 20px;
            letter-spacing: 0.3px;
            margin: 20px 0;
        }
        .container h1 {
            font-size: 40px;
        }
        .container span {
            font-size: 12px;
            margin-bottom: 20px;
        }
        .container a {
            color: #fff;
            font-size: 13px; 
            text-decoration: none; 
            margin: 15px 0 10px;
        }
        .container button {
            background-color: #031E49;
            color: #fff;
            font-size: 12px;
            padding: 10px 45px;
            border: 2px solid transparent;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.6s;
        }
        .container button:hover {
            background-color: transparent; 
            border-color: #fff;
        }
        .container form {
            background-color: #1A618A;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            height: 100%;
        }
        .container form button:hover {
            background-color: #fff;
            border-color: #031E49;
            color: #031E49;
        }
        .container input {
            background-color: #0A1E36;
            border: none;
            margin: 8px 0;
            padding: 10px 20px;
            font-size: 15px;
            color: white;
            border-radius: 8px; 
            width: 100%;
            outline: none;
        }
        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.6s ease-in-out;
        }
        .sign-in {
            left: 0;
            width: 50%;
            z-index: 2;
        }
        .container.active .sign-in {
            transform: translateX(100%);
        }
        .sign-up {
            left: 0;
            width: 50%;
            opacity: 0;
            z-index: 1;
        }
        .container.active .sign-up {
            transform: translateX(100%); 
            opacity: 1;
            z-index: 5;
            animation: move 0.6s;
        }
        @keyframes move {
            0%, 49.99% {
                opacity: 0;
                z-index: 1;
            }
            50%, 100% {
                opacity: 1;
                z-index: 5;
            }
        }
        .social-icons {
            margin: 20px 0;
        }
        .social-icons a {
            border: 2px solid #fff; 
            border-radius: 20%;
            display: inline-flex; 
            justify-content: center; 
            align-items: center;
            margin: 3px;
            width: 40px;
            height: 40px;
            font-size: 20px;
            color: #fff;
            transition: 0.6s;
        }
        .social-icons a:hover {
            background-color: #fff;
            color: #031E49;
        }
        .toggle-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: all 0.6s ease-in-out;
            border-radius: 100px 0 0 100px; 
            z-index: 1000;
        }
        .container.active .toggle-container {
            transform: translateX(-100%);
            border-radius: 0 100px 100px 0;
        }
        .toggle {
            background-color: #1f0a7c00;
            height: 100%;
            position: relative;
            color: #fff;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0); 
            transition: all 0.6s ease-in-out;
            background-image: url('https://kinoplanung.de/wp-content/uploads/2019/12/dolby-cinema_beitragsbild.jpg');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
        }
        .toggle button {
            border: 2px solid #fff;
            background-color: transparent;
        }
        .toggle button:hover {
            background-color: #fff;
            color: #031E49;
        }
        .container.active .toggle {
            transform: translateX(50%);
        }
        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            top: 0;
            padding: 0 30px;
            text-align: center;
            transform: translateX(0);
            transition: all 0.6s ease-in-out;
            background-color: rgba(3, 30, 73, 0.7);
        }
        .toggle-left {
            transform: translateX(-200%);
        }
        .container.active .toggle-left {
            transform: translateX(0);
        }
        .toggle-right {
            transform: translateX(0);
            right: 0;
        }
        .container.active .toggle-right {
            transform: translateX(200%); 
        }
    </style>
    <style>
        
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css');
        .fa-brands {
            font-family: "Font Awesome 6 Brands" !important;
            font-weight: 400;
            font-style: normal;
            display: inline-block;
            text-rendering: auto;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body>
    <div class="container" id="container"> 
        <div class="form-container sign-up"> 
            <form action="homepage.html">
                <h1>Create Account</h1>
                <div class="social-icons">
                    <a href="https://accounts.google.com/signin/v2/usernamerecovery?ddm=1&flowName=GlifWebSignIn&flowEntry=ServiceLogin" class="icon"><i class="fa-brands fa-google"></i></a>
                    <a href="https://www.facebook.com/login.php/" class="icon"><i class="fa-brands fa-facebook"></i></a>
                    <a href="https://github.com/login" class="icon"><i class="fa-brands fa-github"></i></a>
                    <a href="https://www.linkedin.com/login" class="icon"><i class="fa-brands fa-linkedin"></i></a>
                </div>
                <span>or use your email for registration</span>
                <input type="text" placeholder="Name" />
                <input type="email" placeholder="Email" />
                <input type="password" placeholder="Password" />
                <button>Sign Up</button>
            </form>
        </div>
        <div class="form-container sign-in">
            <form action="homepage.html">
                <h1>Log In</h1>
                <div class="social-icons">
                    <a href="https://accounts.google.com/signin/v2/usernamerecovery?ddm=1&flowName=GlifWebSignIn&flowEntry=ServiceLogin" class="icon"><i class="fa-brands fa-google"></i></a>
                    <a href="https://www.facebook.com/login.php/" class="icon"><i class="fa-brands fa-facebook"></i></a>
                    <a href="https://github.com/login" class="icon"><i class="fa-brands fa-github"></i></a>
                    <a href="https://www.linkedin.com/login" class="icon"><i class="fa-brands fa-linkedin"></i></a>
                </div>
                <span>or use your email password</span>
                <input type="email" placeholder="Email" />
                <input type="password" placeholder="Password" />
                <a href="#" class="fp">Forget your Password</a>
                <button>Log In</button>
            </form>
        </div>
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Welcome Back!</h1>
                    <p>Enter your personal details to use all of site features</p> 
                    <button class="hidden" id="login">Sign In</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Hello, Friend!</h1>
                    <p>Register with your personal details to use all of site features</p>
                    <button class="hidden" id="register">Sign Up</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const container = document.getElementById('container');
        const loginBtn = document.getElementById('login');
        const registerBtn = document.getElementById('register');

        registerBtn.addEventListener('click', () => {
            container.classList.add('active');
        });

        loginBtn.addEventListener('click', () => {
            container.classList.remove('active');
        });
    </script>
</body>
</html>
